<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" fill="none">
  <defs>
    <clipPath id="pill">
      <rect x="12" y="4" width="16" height="32" rx="8" transform="rotate(-30 20 20)"/>
    </clipPath>
  </defs>
  <!-- Pill outline -->
  <rect x="12" y="4" width="16" height="32" rx="8" transform="rotate(-30 20 20)" fill="none" stroke="#22A68C" stroke-width="1.8"/>
  <!-- Bottom half fill -->
  <g clip-path="url(#pill)">
    <rect x="-5" y="20" width="50" height="25" fill="#22A68C"/>
  </g>
  <!-- Center dividing line -->
  <line x1="6" y1="20" x2="34" y2="20" stroke="#F9F7F4" stroke-width="1" clip-path="url(#pill)"/>
  <!-- Fingerprint arcs on bottom half — shifted down to fill evenly -->
  <g clip-path="url(#pill)">
    <g stroke="#E3EFE9" stroke-width="1.2" fill="none" stroke-linecap="round">
      <path d="M13 24 Q20 21.5 27 24"/>
      <path d="M12 26.5 Q20 23 28 26.5"/>
      <path d="M11.5 29 Q20 24.5 28.5 29"/>
      <path d="M12 31.5 Q20 26.5 28 31.5"/>
      <path d="M13 34 Q20 29 27 34"/>
      <path d="M14.5 36.5 Q20 31.5 25.5 36.5"/>
      <path d="M16.5 38.5 Q20 34 23.5 38.5"/>
    </g>
  </g>
</svg>